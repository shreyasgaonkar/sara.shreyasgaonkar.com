<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara's Journey</title>
    <meta name="description" content="Sara's milestone timeline - a growing story of firsts, discoveries, and personality snapshots.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="baby-icon">&#x1F476;</div>
            <h1>Sara's Journey</h1>
            <p class="subtitle">A timeline of firsts, favorites, and tiny victories</p>
        </div>
        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="cloud cloud-4"></div>
            <div class="cloud cloud-5"></div>
        </div>
    </header>

    <main>
        <section class="birth-stats">
            <div class="stat">
                <span class="stat-label">Born</span>
                <span class="stat-value">Nov 21, 2025</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span class="stat-value">12:05 PM</span>
            </div>
            <div class="stat">
                <span class="stat-label">Weight</span>
                <span class="stat-value">3.134 kg</span>
            </div>
            <div class="stat">
                <span class="stat-label">Height</span>
                <span class="stat-value">50 cm</span>
            </div>
        </section>

        <section class="traits-section">
            <div class="section-header">
                <h2 class="section-heading">The Sara Files</h2>
                <p class="section-sub">A field guide to her many quirks</p>
            </div>
            <div class="traits-grid" id="traits-grid"></div>
        </section>

        <section class="growth-section">
            <div class="section-header">
                <h2 class="section-heading">Growing Up</h2>
            </div>
            <div class="growth-chart" id="growth-chart"></div>
        </section>

        <section class="timeline-section">
            <div class="section-header">
                <h2 class="section-heading">Timeline</h2>
                <p class="section-sub">A growing story of firsts</p>
            </div>
            <div class="timeline" id="timeline"></div>
        </section>
    </main>

    <footer></footer>

    <script src="scripts/traits.js"></script>
    <script src="scripts/growth.js"></script>
    <script src="scripts/timeline.js"></script>
    <script src="scripts/parallax.js"></script>
    <script src="scripts/index.js"></script>
</body>
</html>
